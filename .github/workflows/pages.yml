name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/features/github-pages-site.md'
      - 'docs/index.md'
      - 'docs/testing.md'
      - 'docs/decisions/ADR-0001-github-pages-public-docs.md'
      - 'README.md'
      - 'PRIVACY.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site files exist
        run: |
          test -f docs/site/index.html
          test -f docs/site/docs.html
          test -f docs/site/privacy.html
          test -f docs/site/roadmap.html
          test -f docs/site/styles.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
